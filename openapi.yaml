openapi: 3.0.3
info:
  title: Kukla x Logward x shiftX
  version: 0.2.0
  description: >
    Draft API for discussion with partner.

    Notes:
    - Authentication: Basic Auth (User/Password).
    - Date/time fields use ISO 8601 (RFC 3339), e.g. 2026-01-20T12:34:56Z.

servers:
  - url: https://intertrans.cloud/IT8Kukla/hs/kukla/
    description: PRODUCTION
  - url: https://intertrans.cloud/IT8KuklaIgor/hs/kukla/
    description: SANDBOX

security:
  - basicAuth: []

paths:
  /v1/test:
    get:
      summary: Test API connection
      description: >
        Simple endpoint to test connectivity and authentication.
        Returns plain text "OK" if connection is established successfully.
      operationId: testConnection
      responses:
        "200":
          description: Connection successful
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
        "401":
          description: Unauthorized (invalid user/password)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/serviceException"
              examples:
                Unauthorized:
                  value:
                    type: "unauthorized"
                    title: "Unauthorized"
                    status: 401
                    detail: "Invalid credentials"
                    errorId: "1c6a6f55-3b69-4b69-9c2c-2b2c4c3c8c0a"
                    timestamp: "2026-01-20T12:34:56Z"
                    instance: "/v1/test"

  /v1/logward/order:
    post:
      summary: Create Logward order
      description: >
        This endpoint is used to create or upsert a transport order in the Intertrans system based on data provided by Logward / shiftX.
        The request contains the full order payload, including general order information, cargo details and transport unit data.
        If an order with the same external reference already exists, the system may update the existing order instead of creating a new one (upsert behavior).
        Some information (for example, actual arrival dates) may be unknown at the time of order creation and can be provided later via a dedicated update endpoint.
        On successful processing, the API returns a unique OrderUUID, which can be used for further updates or troubleshooting.
        The request is validated both structurally and semantically.
        If referenced master data (e.g. carrier, consignee, ports) cannot be resolved, the request will be rejected with a validation error.
      operationId: postLogwardOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/transportOrderEnvelope"
      responses:
        "200":
          description: Transport order accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/transportOrderResponse"
        "400":
          description: Bad request (invalid JSON / format)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/serviceException"
              examples:
                InvalidJson:
                  value:
                    type: "bad_request"
                    title: "Invalid JSON"
                    status: 400
                    detail: "Request body cannot be parsed"
                    errorId: "b2f5e1d6-5a5f-4c0f-b6d6-4d5a0b0d7c1e"
                    timestamp: "2026-01-20T12:34:56Z"
                    instance: "/v1/logward/order"
                    errors:
                      - code: "BAD_JSON"
                        field: "transport_order.shiftxId"
                        message: "Field 'transport_order.shiftxId' is required"
        "422":
          description: Validation / mapping error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/serviceException"
              examples:
                MappingNotFoundCarrier:
                  value:
                    type: "validation_error"
                    title: "Validation failed"
                    status: 422
                    detail: "Some fields contain unknown references"
                    errorId: "e7c31f6c-2c43-4d4f-8a52-5f8b9b5fd0c2"
                    timestamp: "2026-01-20T12:34:56Z"
                    instance: "/v1/logward/order"
                    errors:
                      - code: "MAPPING_NOT_FOUND"
                        field: "transport_order.carrierScac"
                        message: "Carrier not found in Intertrans master data"
                        rejectedValue: "MAEU"
                        expectedValue: "Known carrier reference / mapping to Order.Carrier"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/serviceException"
              examples:
                InternalError:
                  value:
                    type: "internal_error"
                    title: "Internal server error"
                    status: 500
                    detail: "Unexpected error while processing request"
                    errorId: "a3c91c0b-5c2b-4a8e-9d5b-1f7b8f0e3a21"
                    timestamp: "2026-01-20T12:35:10Z"
                    instance: "/v1/logward/order"
                    errors:
                      - code: "SERVER ERROR"
                        field: "order"
                        message: "Division durch null"

  /v1/logward/order/{shiftxId}:
    patch:
      summary: Update transport units of an existing order
      description: >
        Partially updates transport unit data for an existing order identified by its shiftX ID.

        Each item in the request array is matched by `containerNumber`.
        Only the fields provided in the request body are updated; omitted fields remain unchanged (true partial update semantics).

        Updatable fields per transport unit:
        - estimatedDeparturePol
        - actualDeparturePol
        - estimatedArrivalPod
        - actualArrivalPod

        If a `containerNumber` is not found within the referenced order, the item is rejected
        with a validation error. The overall request is processed atomically: if any item fails
        validation, no updates are applied.
      operationId: patchLogwardOrder
      parameters:
        - name: shiftxId
          in: path
          required: true
          description: External identifier of the order in the shiftX / Logward system.
          schema:
            type: string
          example: "SX-2026-00142"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/transportOrderUpdateEnvelope"
            examples:
              UpdateDates:
                summary: Update ETD / ATD / ETA / ATA for two containers
                value:
                  transport_order:
                    transport_unit:
                      - containerNumber: "WLS26280"
                        estimatedDeparturePol: "2026-02-10T08:00:00Z"
                        actualDeparturePol: "2026-02-10T09:15:00Z"
                        estimatedArrivalPod: "2026-02-28T06:00:00Z"
                        actualArrivalPod: "2026-02-28T07:30:00Z"
                      - containerNumber: "MSCU1234567"
                        estimatedArrivalPod: "2026-03-01T12:00:00Z"
      responses:
        "200":
          description: Transport unit data updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/transportOrderResponse"
              examples:
                Updated:
                  value:
                    OrderUUID: "d2c99d32-7d8c-4987-899c-208d28cfed52"
        "400":
          description: Bad request (invalid JSON / format)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/serviceException"
              examples:
                InvalidJson:
                  value:
                    type: "bad_request"
                    title: "Invalid JSON"
                    status: 400
                    detail: "Request body cannot be parsed"
                    errorId: "c1a2b3d4-0000-4000-8000-111122223333"
                    timestamp: "2026-01-20T12:34:56Z"
                    instance: "/v1/logward/order/SX-2026-00142"
        "404":
          description: Order not found for the given shiftxId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/serviceException"
              examples:
                OrderNotFound:
                  value:
                    type: "not_found"
                    title: "Order not found"
                    status: 404
                    detail: "No order found for shiftxId 'SX-2026-99999'"
                    errorId: "f9e8d7c6-1234-4abc-9def-000011112222"
                    timestamp: "2026-01-20T12:34:56Z"
                    instance: "/v1/logward/order/SX-2026-99999"
        "422":
          description: Validation error (e.g. unknown containerNumber)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/serviceException"
              examples:
                ContainerNotFound:
                  value:
                    type: "validation_error"
                    title: "Validation failed"
                    status: 422
                    detail: "One or more container numbers could not be matched"
                    errorId: "a1b2c3d4-5678-4def-8abc-999988887777"
                    timestamp: "2026-01-20T12:34:56Z"
                    instance: "/v1/logward/order/SX-2026-00142"
                    errors:
                      - code: "CONTAINER_NOT_FOUND"
                        field: "transport_unit[1].containerNumber"
                        message: "Container not found in order"
                        rejectedValue: "MSCU9999999"
                        expectedValue: "A containerNumber that belongs to order SX-2026-00142"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/serviceException"
              examples:
                InternalError:
                  value:
                    type: "internal_error"
                    title: "Internal server error"
                    status: 500
                    detail: "Unexpected error while processing request"
                    errorId: "b7f3e2a1-9c4d-4e5f-a123-456789abcdef"
                    timestamp: "2026-01-20T12:35:10Z"
                    instance: "/v1/logward/order/SX-2026-00142"

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  schemas:

    # ── PATCH envelope ────────────────────────────────────────────────────────
    transportOrderUpdateEnvelope:
      type: object
      required:
        - transport_order
      properties:
        transport_order:
          $ref: "#/components/schemas/transportOrderUpdate"

    transportOrderUpdate:
      type: object
      description: >
        Partial update payload for an existing transport order.
        Currently supports updating transport unit date fields.
        Additional top-level order fields may be added here in future versions.
      properties:
        transport_unit:
          type: array
          minItems: 1
          description: >
            List of transport unit updates. Each item is matched by containerNumber.
            At least one date field must be present per item.
          items:
            $ref: "#/components/schemas/transportUnitUpdate"

    transportUnitUpdate:
      type: object
      required:
        - containerNumber
      description: >
        Partial update for a single transport unit, identified by containerNumber.
        All date fields are optional; omitted fields are left unchanged.
        At least one of the four date fields must be provided.
      properties:
        containerNumber:
          type: string
          example: "WLS26280"
          description: >
            Container number used to identify the transport unit within the order.
            Must match an existing transport unit on the referenced order.
        estimatedDeparturePol:
          type: string
          format: date-time
          description: Estimated departure at port of loading (ISO 8601). Updates existing value if provided.
          example: "2026-02-10T08:00:00Z"
        actualDeparturePol:
          type: string
          format: date-time
          description: Actual departure at port of loading (ISO 8601). Updates existing value if provided.
          example: "2026-02-10T09:15:00Z"
        estimatedArrivalPod:
          type: string
          format: date-time
          description: Estimated arrival at port of discharge (ISO 8601). Updates existing value if provided.
          example: "2026-02-28T06:00:00Z"
        actualArrivalPod:
          type: string
          format: date-time
          description: Actual arrival at port of discharge (ISO 8601). Updates existing value if provided.
          example: "2026-02-28T07:30:00Z"

    # ── POST schemas (unchanged) ───────────────────────────────────────────────
    transportOrderEnvelope:
      type: object
      required:
        - transport_order
      properties:
        transport_order:
          $ref: "#/components/schemas/transportOrder"

    transportOrderResponse:
      type: object
      required:
        - OrderUUID
      properties:
        OrderUUID:
          type: string
          minLength: 36
          maxLength: 36
          example: "d2c99d32-7d8c-4987-899c-208d28cfed52"
          description: Unique identifier of the created or updated order in Intertrans.

    transportOrder:
      type: object
      required:
        - purchaseOrderNumber
        - consigneeNameDetails
        - carrierScac
        - polLocode
        - podLocode
        - cargo
        - transport_unit
      properties:
        purchaseOrderNumber:
          type: string
          maxLength: 50
          example: "TEN248392"
          description: >
            Purchase order number (likely Logward order number).
        shiftxId:
          type: string
          description: >
            External identifier from partner system.
        code:
          type: string
          description: >
            Partner-specific code.
        bookingAgentOffice1:
          type: string
          description: >
            Booking agent office.
        consignee_master_data:
          $ref: "#/components/schemas/consignee"
        carrierName:
          type: string
          description: >
            Carrier name.
        carrierScac:
          type: string
          description: >
            Carrier identifier (SCAC).
        polName:
          type: string
          example: "DEHAM"
          description: Port of loading UN/LOCODE (e.g. DEHAM).
        polLocode:
          type: string
          example: "DEHAM"
          description: Port of loading UN/LOCODE (e.g. DEHAM).
        podName:
          type: string
          example: "NLRTM"
          description: Port of discharge NAME.
        podLocode:
          type: string
          example: "NLRTM"
          description: Port of discharge UN/LOCODE (e.g. NLRTM).
        cargo:
          $ref: "#/components/schemas/cargo"
        transport_unit:
          type: array
          items:
            $ref: "#/components/schemas/transportUnit"

    cargo:
      type: object
      required:
        - itemDescription
        - itemQuantity
        - packageQuantity
        - packagingType
        - grossWeight
      properties:
        itemDescription:
          type: string
          maxLength: 200
          example: "Food on pallets"
          description: Cargo description
          x-mapping:
            fieldPath: "Order.Shipment.Shipment"
        itemQuantity:
          type: number
          description: Quantity of transported goods
          x-mapping:
            fieldPath: "Order.Shipment.Quantity"
        packageQuantity:
          type: number
          description: Number of packages
          x-mapping:
            fieldPath: "Order.Shipment.PackageQuantity"
        packagingType:
          type: string
          description: >
            Packaging type code.

            Allowed values:
            BA  - Ballen
            BAG - Bags
            BB  - Bigbags
            CA  - Cases
            CC  - CC
            COL - Colli
            CT  - Container
            DD  - Düsseldorfer Paletten
            DD-K - DDP Konto Tauschpalette
            DD-N - DDP keine Tauschpalette
            DD-T - DDP Tauschpalette
            DRM - Drum
            EP  - Einwegpalette
            EU  - Europaletten keine Tauschpalette
            EU-K - Europaletten Konto Tauschpalette
            EU-N - Europaletten keine Tauschpalette
            EU-T - Europaletten Tauschpalette
            EU-V - Europaletten Voucher
            F   - Fässer
            FLS - Flaschen
            FP  - FP
            FT  - Flexi Tank
            GP  - GP
            HHP - Heilbronner Halbpalette
            HP  - Halb-Palette
            IND - Industrie Paletten
            KAR - Kartons
            LDG - Ladung
            LDM - Lademeter
            PAL - Palette gemischt
            PKG - Packages
            SAC - Säcke
            SLS - Slipsheets
            SP  - Stellplatz
            STK - Stück
            TC  - Tankcontainer
            VMF - AMERICAN / VMF (1.20 x 1.00)
          enum:
            - BA
            - BAG
            - BB
            - CA
            - CC
            - COL
            - CT
            - DD
            - DD-K
            - DD-N
            - DD-T
            - DRM
            - EP
            - EU
            - EU-K
            - EU-N
            - EU-T
            - EU-V
            - F
            - FLS
            - FP
            - FT
            - GP
            - HHP
            - HP
            - IND
            - KAR
            - LDG
            - LDM
            - PAL
            - PKG
            - SAC
            - SLS
            - SP
            - STK
            - TC
            - VMF
          example: "EU"
          x-mapping:
            fieldPath: "Order.Shipment.PackageType"
        grossWeight:
          type: number
          description: Gross weight of goods
          x-mapping:
            fieldPath: "Order.Shipment.ActualWeight"

    transportUnit:
      type: object
      required:
        - containerType
        - containerNumber
      properties:
        containerType:
          type: string
          maxLength: 50
          example: "20' STANDARD"
          description: Container type
        containerNumber:
          type: string
          example: "WLS26280"
          description: Container number
        estimatedDeparturePol:
          type: string
          format: date-time
          description: Estimated departure at POL (ISO 8601)
        actualDeparturePol:
          type: string
          format: date-time
          description: Actual departure at POL (ISO 8601)
        estimatedArrivalPod:
          type: string
          format: date-time
          description: Estimated arrival at POD (ISO 8601)
        actualArrivalPod:
          type: string
          format: date-time
          description: Actual arrival at POD (ISO 8601)
        actualTotalWeight:
          type: number
          description: >
            Total actual weight.
        informationVesselName:
          type: string
          maxLength: 50
          example: "CMA CGM Monitor"
          description: Vessel name
        voyage:
          type: string
          maxLength: 50
          example: "1234x45"
          description: Voyage number
        bookingNumber:
          type: string
          maxLength: 50
          example: "2700009966"
          description: Booking number
        mblNoContainer:
          type: string
          maxLength: 50
          description: Master B/L number

    consignee:
      type: object
      description: Standard error response (Problem Details style)
      required:
        - name
      properties:
        name:
          type: string
          description: Consignee name.
          example: Muster Firma
        bco:
          type: string
          description: Beneficial Cargo Owner
          example: 563245
        vatNumber:
          type: string
          description: A unique number that identifies a taxable person or non-taxable legal entity registered for VAT
          example: DE123456789
        eoriNumber:
          type: string
          description: Economic Operators Registration and Identification
          example: DE123456789012345
        street:
          type: string
          description: Consignee street
          example: Main street
        houseNumber:
          type: string
          description: Consignee house number
          example: 23a
        postalCode:
          type: string
          description: Consignee postal code
          example: 86000
        city:
          type: string
          description: Consignee city
          example: Berlin
        country:
          type: string
          description: Country code in ISO 3166 (Alpha-2)
          example: DE

    serviceException:
      type: object
      description: Standard error response (Problem Details style)
      required:
        - type
        - title
        - status
        - errorId
        - timestamp
      properties:
        type:
          type: string
          description: Machine-readable error type
          example: "validation_error"
        title:
          type: string
          description: Short summary
          example: "Validation failed"
        status:
          type: integer
          format: int32
          description: HTTP status code
          example: 422
        detail:
          type: string
          description: Human-readable explanation
          example: "Some fields contain unknown references"
        errorId:
          type: string
          description: Unique id for troubleshooting
          example: "e7c31f6c-2c43-4d4f-8a52-5f8b9b5fd0c2"
        timestamp:
          type: string
          format: date-time
          description: Error time in ISO 8601
          example: "2026-01-20T12:34:56Z"
        instance:
          type: string
          description: Request path or correlation pointer
          example: "/v1/logward/order"
        errors:
          type: array
          description: Optional list of field-level issues
          items:
            $ref: "#/components/schemas/serviceExceptionItem"

    serviceExceptionItem:
      type: object
      description: Single field / mapping issue
      required:
        - code
        - field
        - message
      properties:
        code:
          type: string
          description: Sub-code
          example: "MAPPING_NOT_FOUND"
        field:
          type: string
          description: Field path in request payload
          example: "transport_order.carrierScac"
        message:
          type: string
          description: Human-readable message
          example: "Carrier not found in Intertrans master data"
        rejectedValue:
          description: The value that caused the error (any type)
        expectedValue:
          type: string
          description: Optional hint what is expected
          example: "Known carrier reference / mapping to Order.Carrier"
